<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Panti Al-Ittifaqiah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-emas { color: #D4AF37; }
        .bg-zamrud { background-color: #14362B; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- LAYER LOGIN -->
    <div id="loginPanel" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-zamrud">Login Admin</h1>
            <p class="text-gray-500 text-sm">Panti Asuhan Al-Ittifaqiah</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username <span class="text-emas">*WAJIB DIISI</span></label>
                <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password <span class="text-emas">*WAJIB DIISI</span></label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
            </div>
            <button onclick="prosesLogin()" class="w-full bg-zamrud hover:bg-[#0c241c] text-white font-bold py-3.5 rounded-xl transition-colors mt-2">Masuk</button>
            <div class="mt-4 text-center">
                <a href="index.html" class="text-sm text-gray-500 hover:text-zamrud hover:underline font-semibold transition-colors">
                    &larr; Kembali ke halaman Website
                </a>
            </div>        
        </div>
    </div>

    <!-- LAYER DASHBOARD (Tersembunyi secara default) -->
    <div id="dashboardPanel" class="hidden w-full max-w-4xl p-6">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-3xl font-bold text-zamrud">Dashboard Admin</h2>
                <button onclick="location.reload()" class="text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg font-semibold transition-colors">Logout</button>
            </div>
            
            <div class="flex gap-4 mb-8">
                <button onclick="bukaTab('formBerita', this)" class="tab-btn bg-zamrud text-white px-6 py-2 rounded-lg font-semibold transition-colors">Upload Berita</button>
                <button onclick="bukaTab('formKeuangan', this)" class="tab-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-6 py-2 rounded-lg font-semibold transition-colors">Laporan Keuangan</button>
                <button onclick="bukaTab('formStruktur', this)" class="tab-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-6 py-2 rounded-lg font-semibold transition-colors">Struktur Organisasi</button>
            </div>

            <div id="formBerita" class="tab-content space-y-5">
                <h3 class="text-xl font-bold mb-4">Tambah Berita Baru</h3>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Judul Berita <span class="text-emas">*WAJIB DIISI</span></label>
                    <input type="text" id="judulBerita" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Foto <span class="text-emas">*WAJIB DIISI</span></label>
                    <input type="file" id="fotoBerita" accept="image/*" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Isi Berita</label>
                    <textarea id="isiBerita" rows="5" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud"></textarea>
                </div>
                <button onclick="kirimBerita()" class="w-full bg-emas hover:bg-[#b5952f] text-zamrud font-bold py-3.5 rounded-xl transition-colors mt-4">Simpan Berita</button>
            </div>

            <div id="formKeuangan" class="tab-content hidden space-y-5">
                <h3 class="text-xl font-bold mb-4">Input Data Keuangan</h3>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Jenis Transaksi <span class="text-emas">*WAJIB DIISI</span></label>
                    <select id="jenisKeuangan" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                        <option value="Pemasukan">Pemasukan</option>
                        <option value="Pengeluaran">Pengeluaran</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nominal (Rp) <span class="text-emas">*WAJIB DIISI</span></label>
                    <input type="number" id="nominalKeuangan" placeholder="Contoh: 500000" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Keterangan <span class="text-emas">*WAJIB DIISI</span></label>
                    <textarea id="ketKeuangan" rows="3" placeholder="Contoh: Donasi dari Hamba Allah / Pembelian Beras" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud"></textarea>
                </div>
                <button onclick="simpanKeuangan()" class="w-full bg-emas hover:bg-[#b5952f] text-zamrud font-bold py-3.5 rounded-xl transition-colors mt-4">Simpan Laporan</button>
            </div>

            <!-- TAB 3: Form Struktur Organisasi -->
            <div id="formStruktur" class="tab-content hidden space-y-5">
                <h3 class="text-xl font-bold mb-4">Tambah / Edit Pengurus</h3>
                
                <input type="hidden" id="editRowId" value="">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap <span class="text-emas">*WAJIB DIISI</span></label>
                    <input type="text" id="namaPengurus" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Jabatan <span class="text-emas">*WAJIB DIISI</span></label>
                    <input type="text" id="jabatanPengurus" placeholder="Contoh: Pimpinan Panti, Sekretaris, dll" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Foto <span id="labelFoto" class="text-emas">*WAJIB DIISI</span></label>
                    <input type="file" id="fotoPengurus" accept="image/*" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-zamrud">
                    <p id="infoFotoEdit" class="text-xs text-gray-500 mt-1 hidden">Biarkan kosong jika tidak ingin mengubah foto.</p>
                </div>
                <button onclick="tambahPengurus()" id="btnSimpanPengurus" class="w-full bg-emas hover:bg-[#b5952f] text-zamrud font-bold py-3.5 rounded-xl transition-colors mt-4">Simpan Pengurus</button>
                
                <!-- Garis Pemisah agar rapi -->
                <hr class="my-10 border-gray-200">
                
                <!-- Tabel Daftar Pengurus -->
                <h3 class="text-xl font-bold mb-4">Daftar Pengurus Saat Ini</h3>
                <div class="overflow-x-auto rounded-xl border border-gray-200">
                    <table class="w-full text-left border-collapse bg-white">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm">
                                <th class="p-4 border-b w-20">Foto</th>
                                <th class="p-4 border-b">Nama</th>
                                <th class="p-4 border-b">Jabatan</th>
                                <th class="p-4 border-b w-24 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelPengurus">
                            <tr><td colspan="4" class="p-4 text-center text-gray-500">Silakan tunggu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div> <!-- Ini penutup formStruktur yang benar -->
            
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const URL_API = 'https://script.google.com/macros/s/AKfycbyY_jo_Fqm5fRzj-b1hehIlE6ZclTV8rHrBnTrpRZlfssbKmSltRXMlbr50WPoR9Z2FlA/exec'; 

        // --- SISTEM LOGIN & TAB ---
        function prosesLogin() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            
            if(u === 'admin' && p === 'admin') {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('dashboardPanel').classList.remove('hidden');
                document.body.classList.remove('items-center', 'justify-center');
                document.body.classList.add('items-start', 'pt-10');
            } else {
                alert('Username atau Password salah!');
            }
        }

        function bukaTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-zamrud', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            document.getElementById(tabId).classList.remove('hidden');
            btnElement.classList.remove('bg-gray-200', 'text-gray-700');
            btnElement.classList.add('bg-zamrud', 'text-white');

            // Tambahan: Muat tabel jika tab Struktur yang diklik
            if(tabId === 'formStruktur') {
                muatDaftarPengurus();
            }
        }

        // --- FUNGSI UPLOAD BERITA ---
        async function kirimBerita() {
            const judul = document.getElementById('judulBerita').value;
            const isi = document.getElementById('isiBerita').value;
            const fileInput = document.getElementById('fotoBerita');
            const tombol = document.querySelector('button[onclick="kirimBerita()"]');

            if (!judul || fileInput.files.length === 0) {
                alert("Judul dan Foto WAJIB diisi!");
                return;
            }

            const file = fileInput.files[0];
            tombol.innerText = "⏳ Sedang Menyimpan...";
            tombol.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const payload = {
                    action: "upload_berita",
                    judul: judul,
                    isi: isi,
                    namaFile: file.name,
                    fotoBase64: reader.result
                };

                try {
                    const response = await fetch(URL_API, { method: "POST", body: JSON.stringify(payload) });
                    const result = await response.json();
                    if (result.status === "success") {
                        alert("✅ " + result.message);
                        document.getElementById('judulBerita').value = '';
                        document.getElementById('isiBerita').value = '';
                        document.getElementById('fotoBerita').value = '';
                    } else alert("❌ Gagal: " + result.message);
                } catch (error) {
                    alert("Terjadi kesalahan koneksi!");
                } finally {
                    tombol.innerText = "Simpan Berita";
                    tombol.disabled = false;
                }
            };
        }

        // --- FUNGSI LAPORAN KEUANGAN ---
        async function simpanKeuangan() {
            const jenis = document.getElementById('jenisKeuangan').value;
            const nominal = document.getElementById('nominalKeuangan').value;
            const keterangan = document.getElementById('ketKeuangan').value;
            const tombol = document.querySelector('button[onclick="simpanKeuangan()"]');

            if (!nominal || !keterangan) {
                alert("Nominal dan Keterangan WAJIB diisi!");
                return;
            }

            tombol.innerText = "⏳ Sedang Menyimpan...";
            tombol.disabled = true;

            const payload = {
                action: "simpan_keuangan",
                jenis: jenis,
                nominal: nominal,
                keterangan: keterangan
            };

            try {
                const response = await fetch(URL_API, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();
                
                if (result.status === "success") {
                    alert("✅ " + result.message);
                    document.getElementById('nominalKeuangan').value = '';
                    document.getElementById('ketKeuangan').value = '';
                } else {
                    alert("❌ Gagal: " + result.message);
                }
            } catch (error) {
                alert("Terjadi kesalahan koneksi!");
            } finally {
                tombol.innerText = "Simpan Laporan";
                tombol.disabled = false;
            }
        }

        // --- FUNGSI TAMBAH PENGURUS ---
        function siapkanEditStruktur(row, nama, jabatan) {
            // Isi form dengan data yang ditarik dari tabel
            document.getElementById('namaPengurus').value = nama;
            document.getElementById('jabatanPengurus').value = jabatan;
            document.getElementById('editRowId').value = row; 

            // Ubah tampilan form agar sesuai mode Edit
            document.getElementById('labelFoto').classList.add('hidden');
            document.getElementById('infoFotoEdit').classList.remove('hidden');
            
            const btn = document.getElementById('btnSimpanPengurus');
            btn.innerText = "Update Data Pengurus";
            btn.classList.replace('bg-emas', 'bg-blue-500');
            btn.classList.replace('hover:bg-[#b5952f]', 'hover:bg-blue-600');
            btn.classList.replace('text-zamrud', 'text-white');

            // Scroll perlahan ke atas form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- FUNGSI TAMBAH ATAU UPDATE PENGURUS ---
        async function tambahPengurus() {
            const nama = document.getElementById('namaPengurus').value;
            const jabatan = document.getElementById('jabatanPengurus').value;
            const fileInput = document.getElementById('fotoPengurus');
            const rowId = document.getElementById('editRowId').value; // Jika ada isinya, berarti mode Edit
            const tombol = document.getElementById('btnSimpanPengurus');

            // Validasi Input
            if (!nama || !jabatan) {
                alert("Nama dan Jabatan WAJIB diisi!");
                return;
            }
            if (!rowId && fileInput.files.length === 0) {
                alert("Foto WAJIB diisi untuk pengurus baru!");
                return;
            }

            tombol.innerText = "⏳ Sedang Menyimpan...";
            tombol.disabled = true;

            let actionType = rowId ? "update_pengurus" : "tambah_pengurus";

            const kirimDataPayload = async (payload) => {
                try {
                    const response = await fetch(URL_API, { method: "POST", body: JSON.stringify(payload) });
                    const result = await response.json();
                    
                    if (result.status === "success") {
                        alert("✅ " + result.message);
                        
                        // Bersihkan dan kembalikan form ke mode default (Tambah)
                        document.getElementById('namaPengurus').value = '';
                        document.getElementById('jabatanPengurus').value = '';
                        document.getElementById('fotoPengurus').value = '';
                        document.getElementById('editRowId').value = '';
                        
                        document.getElementById('labelFoto').classList.remove('hidden');
                        document.getElementById('infoFotoEdit').classList.add('hidden');

                        tombol.innerText = "Simpan Pengurus";
                        tombol.classList.replace('bg-blue-500', 'bg-emas');
                        tombol.classList.replace('hover:bg-blue-600', 'hover:bg-[#b5952f]');
                        tombol.classList.replace('text-white', 'text-zamrud');

                        muatDaftarPengurus(); // Refresh tabel
                    } else {
                        alert("❌ Gagal: " + result.message);
                        tombol.innerText = rowId ? "Update Data Pengurus" : "Simpan Pengurus";
                    }
                } catch (error) {
                    alert("Terjadi kesalahan koneksi!");
                    tombol.innerText = rowId ? "Update Data Pengurus" : "Simpan Pengurus";
                } finally {
                    tombol.disabled = false;
                }
            };

            // Jika ada foto baru yang diupload
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function () {
                    kirimDataPayload({
                        action: actionType,
                        row: rowId,
                        nama: nama,
                        jabatan: jabatan,
                        namaFile: file.name,
                        fotoBase64: reader.result
                    });
                };
            } else {
                // Jika hanya update teks tanpa mengubah foto
                kirimDataPayload({
                    action: actionType,
                    row: rowId,
                    nama: nama,
                    jabatan: jabatan,
                    fotoBase64: "" 
                });
            }
        }
        // --- FUNGSI TAMPILKAN DAFTAR PENGURUS ---
        async function muatDaftarPengurus() {
            const tbody = document.getElementById('tabelPengurus');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">Memuat data dari database...</td></tr>';
            try {
                const response = await fetch(URL_API + "?sheet=Struktur");
                const data = await response.json();
                
                if (data.length > 0) {
                    tbody.innerHTML = '';
                    // Balik data agar yang terbaru di atas
                    data.reverse().forEach(item => {
                        if(!item.nama) return;
                        tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="p-3 text-center">
                                <img src="${item.fotoUrl}" class="w-12 h-12 rounded-full object-cover mx-auto border border-gray-200" onerror="this.src='https://via.placeholder.com/50'">
                            </td>
                            <td class="p-3 font-bold text-zamrud">${item.nama}</td>
                            <td class="p-3 text-sm text-gray-600">${item.jabatan}</td>
                            <td class="p-3 text-center whitespace-nowrap">
                                <button onclick="siapkanEditStruktur(${item.row}, '${item.nama}', '${item.jabatan}')" class="text-blue-500 hover:text-white border border-blue-500 hover:bg-blue-500 text-xs font-bold px-3 py-1.5 rounded transition-colors mr-1">Edit</button>
                                <button onclick="hapusData('Struktur', ${item.row})" class="text-red-500 hover:text-white border border-red-500 hover:bg-red-500 text-xs font-bold px-3 py-1.5 rounded transition-colors">Hapus</button>
                            </td>
                        </tr>`;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">Belum ada data pengurus.</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">Gagal memuat data.</td></tr>';
            }
        }

        // --- FUNGSI HAPUS DATA ---
        async function hapusData(sheetName, row) {
            if(!confirm("Anda yakin ingin menghapus data ini?")) return;
            
            try {
                const payload = { action: "hapus_data", sheetName: sheetName, row: row };
                
                // Ubah teks tombol sementara proses
                const eventTarget = event.target;
                const originalText = eventTarget.innerText;
                eventTarget.innerText = "⏳";
                eventTarget.disabled = true;

                const response = await fetch(URL_API, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.status === "success") {
                    alert("✅ Data berhasil dihapus.");
                    if(sheetName === 'Struktur') muatDaftarPengurus(); // Segarkan tabel
                } else {
                    alert("❌ Gagal menghapus data.");
                    eventTarget.innerText = originalText;
                    eventTarget.disabled = false;
                }
            } catch(e) {
                alert("Terjadi kesalahan saat menghapus data.");
            }
        }        
    </script>
</body>
</html>
